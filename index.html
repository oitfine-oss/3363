<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>복어 피하기 🐡</title>
<style>
  body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#0b0f1a; font-family:sans-serif; }
  canvas { background:#111; border-radius:16px; }
</style>
</head>
<body>
<canvas id="game" width="420" height="600"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = canvas.width;
const H = canvas.height;

const playerImg = new Image();
const obstacleImg = new Image();
playerImg.src = 'player.png';
obstacleImg.src = 'obstacle.png';

let difficulty = 'hard';

const player = { x:W/2-25, y:H-80, size:50, dx:0, speed:6, lives:10 };
let obstacles = [];
let score = 0;
let best = Number(localStorage.getItem('f1-best')||0);
let speed = 3;
let running = false;
let state = 'intro';
let shake = 0;
let message = '';
let introStep = 0;
let endingTimer = 0;
let endingText = '';
let messageTimer = 0;
let bossSpawned = false;

// 버튼 영역
const easyBtn = { x: W/2 - 120, y: H/2 + 40, w: 100, h: 50 };
const hardBtn = { x: W/2 + 20, y: H/2 + 40, w: 100, h: 50 };

const introScenes = [
  '막스: 오늘도 같이 달릴래, 조지?',
  '조지는 아무 말도 하지 않았다.',
  '하지만 막스의 고백은 점점 더 가까워진다...',
  '복어 피하기 시작!'
];

const storyLines = {
  early: ['막스: 나 너 좋아해...', '막스: 오늘도 같이 갈래?', '막스: 피하지마 조지...'],
  mid: ['막스: 왜 계속 피하는데 조지?', '막스: 나 진심이야', '막스: 이쯤 되면 알잖아'],
  late: ['막스: 이제 도망 못 가 조지', '막스: 끝까지 갈 거야', '막스: 오늘은 꼭 답해']
};

function random(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function getLine(){
  if(score < 300) return random(storyLines.early);
  if(score < 900) return random(storyLines.mid);
  return random(storyLines.late);
}

function reset(){
  player.x = W/2-25;
  player.dx = 0;
  player.lives = 10;
  obstacles = [];
  score = 0;
  speed = difficulty==='easy' ? 2 : 3;
  shake = 0;
  message = '막스: 오늘은 꼭 잡을 거야, 조지.';
  messageTimer = 0;
  bossSpawned = false;
}

function startGame(){
  reset();
  running = true;
  state = 'playing';
}

function spawn(){
  obstacles.push({ x:Math.random()*(W-40), y:-40, size:40, speed:speed+Math.random()*1.5, boss:false });
  if(messageTimer <= 0){
    message = getLine();
    messageTimer = 120;
  }
}

function spawnBoss(){
  obstacles.push({ x: W/2 - 70, y: -120, size: 140, speed: difficulty==='easy' ? 2.6 : 3.4, boss:true });
  message = '막스: 이제 진짜 피할 수 있을 것 같아, 조지?';
  messageTimer = 180;
  bossSpawned = true;
});
  message = getLine();
}

function collide(a,b){
  return a.x < b.x+b.size && a.x+a.size>b.x && a.y<b.y+b.size && a.y+a.size>b.y;
}

function update(){
  if(state==='ending'){
    endingTimer++;
    if(endingTimer>180) state='gameover';
    return;
  }

  if(!running) return;

  const spawnRate = difficulty==='easy' ? 0.028 : 0.05;
  if(Math.random()<spawnRate) spawn();

  if(!bossSpawned && score >= 5000){
    spawnBoss();
  }

  if(messageTimer > 0) messageTimer--;

  player.x += player.dx;
  player.x = Math.max(0, Math.min(W-player.size, player.x));

  obstacles.forEach(o=> o.y += o.speed);

  for(let i=obstacles.length-1;i>=0;i--){
    const o = obstacles[i];
    if(collide(player,o)){
      obstacles.splice(i,1);
      player.lives -= o.boss ? 3 : 1;
      shake = o.boss ? 18 : 10;
      if(o.boss){
        message = '조지: 잠깐, 이건 너무 크잖아?!';
        messageTimer = 120;
      }
      if(player.lives<=0){
        running=false;
        state='ending';
        endingText = score>1800 ? '결국 조지는 막스를 받아들였다...' : '조지는 끝내 도망치지 못했다...';
      }
      continue;
    }
    if(o.y>H+160) obstacles.splice(i,1);
  }

  score++;
  if(score%300===0) speed += difficulty==='easy'?0.25:0.45;
}

function drawTrack(){
  ctx.fillStyle='#111';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  for(let y=0;y<H;y+=40){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
}

function drawHUD(){
  ctx.fillStyle='white';
  ctx.font='16px Arial';
  ctx.fillText('Score:'+score,10,20);
  ctx.fillText('Best:'+best,300,20);
  ctx.fillText('❤ x '+player.lives,10,45);
  ctx.fillStyle='#ffd166';
  ctx.font='18px Arial';
  wrapText(message, 28, 76, 360, 22);
}

function drawObjects(){
  ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
  obstacles.forEach(o=> {
    ctx.drawImage(obstacleImg,o.x,o.y,o.size,o.size);
    if(o.boss){
      ctx.fillStyle = '#ff6b6b';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('BOSS', o.x + 42, o.y - 8);
    }
  });
}

function drawButton(btn, text){
  ctx.fillStyle='#1f2937';
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
  ctx.fillStyle='white';
  ctx.textAlign='center';
  ctx.fillText(text, btn.x + btn.w/2, btn.y + btn.h/2 + 5);
  ctx.textAlign='left';
}

function drawStart(){
  drawTrack();
  ctx.fillStyle='white';
  ctx.textAlign='center';
  ctx.font='20px Arial';
  ctx.fillText('난이도 선택', W/2, H/2);
  drawButton(easyBtn,'EASY');
  drawButton(hardBtn,'HARD');
  ctx.textAlign='left';
}

function drawIntro(){
  drawTrack();
  ctx.fillStyle='white';
  ctx.textAlign='center';
  ctx.fillText(introScenes[introStep], W/2, H/2);
  ctx.textAlign='left';
}

function drawEnding(){
  drawTrack();
  ctx.fillStyle='white';
  ctx.textAlign='center';
  ctx.fillText(endingText, W/2, H/2);
  ctx.textAlign='left';
}

function draw(){
  ctx.save();
  if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); shake--; }

  if(state==='intro'){ drawIntro(); ctx.restore(); return; }
  if(state==='start'){ drawStart(); ctx.restore(); return; }

  drawTrack();
  drawObjects();
  drawHUD();

  if(state==='ending') drawEnding();

  ctx.restore();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

canvas.addEventListener('click', e=>{
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if(state==='intro'){
    introStep++;
    if(introStep>=introScenes.length){ state='start'; }
    return;
  }

  if(state==='start'){
    if(x>easyBtn.x && x<easyBtn.x+easyBtn.w && y>easyBtn.y && y<easyBtn.y+easyBtn.h){
      difficulty='easy'; startGame();
    }
    if(x>hardBtn.x && x<hardBtn.x+hardBtn.w && y>hardBtn.y && y<hardBtn.y+hardBtn.h){
      difficulty='hard'; startGame();
    }
  }
});

window.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'||e.key==='a') player.dx=-player.speed;
  if(e.key==='ArrowRight'||e.key==='d') player.dx=player.speed;
});
window.addEventListener('keyup', ()=> player.dx=0);

let loaded=0;
[playerImg, obstacleImg].forEach(img=>{
  img.onload=()=>{ loaded++; if(loaded===2) loop(); }
});
</script>
</body>
</html>
