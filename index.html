<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>복어 피하기 🐡</title>
<style>
  body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#0b0f1a; font-family:sans-serif; }
  canvas { background:#111; border-radius:16px; }
</style>
</head>
<body>
<canvas id="game" width="420" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = canvas.width;
const H = canvas.height;

const playerImg = new Image();
const obstacleImg = new Image();
playerImg.src = 'player.png';
obstacleImg.src = 'obstacle.png';

let state = 'intro';
let running = false;
let score = 0;
let message = '';
let messageTimer = 0;
let bossActive = false;

const player = { x:W/2-25, y:H-80, size:50, dx:0, speed:6, lives:10 };
let obstacles = [];

// 🎭 대사 유지
const lines = [
  '막스: 나 너 좋아해...',
  '막스: 오늘도 같이 갈래?',
  '막스: 피하지마 조지...',
  '막스: 왜 계속 피하는데 조지?',
  '막스: 나 진심이야',
  '막스: 이제 도망 못 가 조지'
];

// 🐶 조지 반응 대사
const georgeLines = [
  '조지: 아니 잠깐만;',
  '조지: 왜 이러는거야 진짜...',
  '조지: 나 레이스 중이거든?!',
  '조지: 집중 좀 하게 해줘!',
  '조지: 이건 좀 부담인데...'
];

function startGame(){
  score = 0;
  player.lives = 10;
  player.x = W/2-25;
  obstacles = [];
  bossActive = false;
  running = true;
  state = 'playing';
  message = '막스: 오늘은 꼭 잡을 거야, 조지.';
  messageTimer = 120;
}

function spawn(){
  if(bossActive) return;
  obstacles.push({ x:Math.random()*(W-40), y:-40, size:40, speed:3, boss:false });

  if(messageTimer<=0){
    message = lines[Math.floor(Math.random()*lines.length)];
    messageTimer = 100;
  }
}

function spawnBoss(){
  bossActive = true;
  obstacles = [{ x:W/2-70, y:-140, size:140, speed:2, boss:true, dx:2 }];
  message = '막스: 이제 진짜 피할 수 있을까, 조지?';
  messageTimer = 180;
}

function update(){
  if(!running) return;

  if(!bossActive && score>=5000) spawnBoss();

  if(!bossActive && Math.random()<0.04) spawn();

  if(messageTimer>0) messageTimer--;

  player.x += player.dx;
  player.x = Math.max(0, Math.min(W-player.size, player.x));

  obstacles.forEach(o=>{
    o.y += o.speed;

    if(o.boss){
      o.x += o.dx;
      if(o.x<0 || o.x+o.size>W) o.dx*=-1;

      // 👉 보스 살아남으면 엔딩
      if(o.y > H/2){
        running = false;
        state = 'ending';
        message = '조지: ...나도 사실 싫진 않았어.';
      }
    }
  });

  for(let i=obstacles.length-1;i>=0;i--){
    const o = obstacles[i];
    if(player.x < o.x+o.size && player.x+player.size>o.x && player.y<o.y+o.size && player.y+player.size>o.y){
      player.lives -= o.boss ? 3 : 1;
      if(!o.boss) obstacles.splice(i,1);

      if(player.lives<=0){
        running=false;
        state='gameover';
      } else {
        // 💬 맞았을 때 조지 반응
        message = georgeLines[Math.floor(Math.random()*georgeLines.length)];
        messageTimer = 100;
      }
    }
  }

  score++;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#111';
  ctx.fillRect(0,0,W,H);

  ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);

  obstacles.forEach(o=> ctx.drawImage(obstacleImg,o.x,o.y,o.size,o.size));

  ctx.fillStyle='white';
  ctx.fillText('Score:'+score,10,20);
  ctx.fillText('❤ x '+player.lives,10,40);

  ctx.fillStyle='#ffd166';
  ctx.font='18px Arial';
  ctx.fillText(message,40,70);

  if(state==='intro') overlay('복어 피하기','클릭해서 시작');
  if(state==='ending') overlay('엔딩','막스의 고백을 받아들였다');
  if(state==='gameover') overlay('게임오버','다시하려면 클릭');
}

function overlay(t,sub){
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='white';
  ctx.textAlign='center';
  ctx.fillText(t,W/2,H/2-10);
  ctx.fillText(sub,W/2,H/2+20);
  ctx.textAlign='left';
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

canvas.addEventListener('click', ()=>{
  if(state==='intro') startGame();
  else if(state==='gameover' || state==='ending') state='intro';
});

window.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'||e.key==='a') player.dx=-player.speed;
  if(e.key==='ArrowRight'||e.key==='d') player.dx=player.speed;
});
window.addEventListener('keyup', ()=> player.dx=0);

let loaded=0;
[playerImg, obstacleImg].forEach(img=>{
  img.onload=()=>{ loaded++; if(loaded===2) loop(); }
});
</script>
</body>
</html>
