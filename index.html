<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>피하기 게임 (간단 버전)</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(180deg, #08111f 0%, #111827 100%);
    }
    canvas {
      background: #0b1220;
      border-radius: 18px;
    }
  </style>
</head>
<body>
<canvas id="game" width="420" height="600"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = canvas.width;
const H = canvas.height;

const playerImg = new Image();
const obstacleImg = new Image();

playerImg.src = 'player.png';
obstacleImg.src = 'obstacle.png';

const player = {
  x: W / 2 - 28,
  y: H - 88,
  size: 56,
  dx: 0,
  speed: 6,
  lives: 3
};

let obstacles = [];
let score = 0;
let bestScore = Number(localStorage.getItem('avoid-best-score-simple') || 0);
let speed = 3;
let running = false;
let gameState = 'start';
let shake = 0;

function resetGame() {
  player.x = W / 2 - 28;
  player.dx = 0;
  player.lives = 3;
  obstacles = [];
  score = 0;
  speed = 3;
  shake = 0;
}

function startGame() {
  resetGame();
  running = true;
  gameState = 'playing';
}

function spawnObstacle() {
  const size = 40;
  obstacles.push({
    x: Math.random() * (W - size),
    y: -size,
    size,
    speed: speed + Math.random() * 1.2
  });
}

function isColliding(a, b) {
  return (
    a.x < b.x + b.size &&
    a.x + a.size > b.x &&
    a.y < b.y + b.size &&
    a.y + a.size > b.y
  );
}

function loseLife() {
  player.lives -= 1;
  shake = 12;
  if (player.lives <= 0) {
    running = false;
    gameState = 'gameover';
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('avoid-best-score-simple', String(bestScore));
    }
  }
}

function update() {
  if (!running) return;

  if (Math.random() < 0.045) spawnObstacle();

  player.x += player.dx;
  player.x = Math.max(0, Math.min(W - player.size, player.x));

  obstacles.forEach(o => o.y += o.speed);

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    if (isColliding(player, o)) {
      obstacles.splice(i, 1);
      loseLife();
      continue;
    }
    if (o.y > H + 50) obstacles.splice(i, 1);
  }

  score++;

  if (score % 300 === 0) speed += 0.4;
}

function drawBackground() {
  ctx.fillStyle = '#0b1220';
  ctx.fillRect(0, 0, W, H);
}

function drawHUD() {
  ctx.fillStyle = 'white';
  ctx.font = 'bold 16px Arial';
  ctx.fillText(`Score: ${score}`, 14, 24);
  ctx.fillText(`Best: ${bestScore}`, 300, 24);

  let hearts = '';
  for (let i = 0; i < player.lives; i++) hearts += '❤';
  ctx.fillStyle = '#ff7b8a';
  ctx.font = '18px Arial';
  ctx.fillText(hearts, 14, 48);
}

function drawPlayer() {
  ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
}

function drawObjects() {
  obstacles.forEach(o => {
    ctx.drawImage(obstacleImg, o.x, o.y, o.size, o.size);
  });
}

function drawOverlay(text) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px Arial';
  ctx.fillText(text, W / 2, H / 2);
  ctx.textAlign = 'left';
}

function draw() {
  ctx.save();

  if (shake > 0) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    shake--;
  }

  drawBackground();
  drawHUD();
  drawObjects();
  drawPlayer();

  if (gameState === 'start') drawOverlay('스페이스 누르면 시작');
  if (gameState === 'gameover') drawOverlay('게임오버 - 스페이스로 재시작');

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
  if ((e.key === ' ' || e.key === 'Enter') && gameState !== 'playing') {
    startGame();
    return;
  }

  if (e.key === 'ArrowLeft' || e.key === 'a') player.dx = -player.speed;
  if (e.key === 'ArrowRight' || e.key === 'd') player.dx = player.speed;
});

window.addEventListener('keyup', () => {
  player.dx = 0;
});

let loaded = 0;
[playerImg, obstacleImg].forEach(img => {
  img.onload = () => {
    loaded++;
    if (loaded === 2) loop();
  };
});
</script>
</body>
</html>
